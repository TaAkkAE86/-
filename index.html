<!DOCTYPE html>
<html lang="th">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Checklist อยู่หอ</title>

<style>
body {font-family:Arial;margin:0;background:#f5f7fa;}
header {background:#4a6fa5;color:white;text-align:center;padding:15px;font-size:20px;}
.container {padding:10px;}
.section {background:white;margin-bottom:12px;padding:10px;border-radius:12px;}
.section h3 {margin:0 0 8px;}
.item {display:flex;align-items:center;margin:5px 0;}
.item input {margin-right:10px;}
.note {width:100%;margin:4px 0;font-size:12px;}
</style>

</head>

<body>

<header>📦 Checklist อยู่หอ</header>
<div class="container" id="app"></div>

<script type="module">

// ✅ ใส่ config ของคุณ
const firebaseConfig = {
  apiKey: "AIzaSyCXO3Ltn5ZdyDUZFq1VMGPteSVR6FcE-uc",
  authDomain: "checklists-c5c0e.firebaseapp.com",
  projectId: "checklists-c5c0e",
  storageBucket: "checklists-c5c0e.firebasestorage.app",
  messagingSenderId: "671107960516",
  appId: "1:671107960516:web:40cbe474b827509d0d0391",
  measurementId: "G-02JC49JXT4"
};

// ✅ init
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ✅ ข้อมูลครบ
const data = {

"ห้องน้ำ":[
"แปรงสีฟัน","ยาสีฟัน","แก้วไว้แปรงฟัน","ที่แขวนแปรงสีฟัน/ยาสีฟัน","กล่องรีเทนเนอร์",
"เม็ดฟู่+อุปกรณ์ทำความสะอาดรี","น้ำยาบ้วนปาก","ไหมขัดฟัน","โฟมล้างหน้า","สบู่",
"แชมพู","ครีมนวด","สบู่โจ๊ะโม๊ะ","ฟองน้ำขัดผิว","ถุงมือขัดผิว","ชั้นวางของในห้องน้ำ",
"น้ำยาล้างห้องน้ำ","แปรงขัดห้องน้ำ","ผ้าเช็ดหน้า","ผ้าเช็ดผม",
"ครีมกันแดด","โลชั่นทาผิว","ครีมทามือ","สำลีก้าน","สำลีแผ่น",
"กรรไกรตัดเล็บ","แหนบ","ตะขอแขวนผ้าเช็ดตัว","น้ำยาซักชุดชั้นใน"
],

"การนอน":[
"หมอน","ผ้าห่ม","ผ้าปู","ท็อปเปอร์","หมอนข้าง",
"ปลอกหมอนสำรอง","ผ้าปูสำรอง 1 ชุด","ที่อุดหู"
],

"ครัว":[
"จาน","ชาม","ช้อนส้อม","แก้วน้ำ","น้ำยาล้างจาน","ฟองน้ำล้างจาน",
"ที่คว่ำจานชาม","หม้อไฟฟ้า","มีดเล็ก","เขียง",
"กล่องถนอมอาหาร","ช้อนชงกาแฟ","ที่เปิดกระป๋อง/ขวด","ถุงซิปล็อก"
],

"ส่วนกลาง":[
"พรมเช็ดเท้า","ปลั๊กพ่วง","ตะกร้าผ้า","ตะกร้าชุดชั้นใน","ตะกร้าผ้าซัก",
"กะละมัง","ไม้แขวนเสื้อ","ที่หนีบผ้า","พวงหนีบ","ราวตากผ้า",
"ผ้าขนหนู","ไดร์เป่าผม","ชั้นวางครีม","กล่องเก็บของฝาปิด",
"ทิชชู่เปียกทำความสะอาด","ทิชชู่เปียกถูห้อง","ไม้ถูพื้นทิชชู่",
"ตู้เย็น","ไฟฉาย","ร่ม","หวี","ทิชชู่เช็ดหน้า","ทิชชู่เช็ดของ",
"ถังขยะ","ถุงขยะ","โคมไฟ","หูฟัง","พัดลม","น้ำหอมปรับอากาศ",
"ผงซักฟอก/น้ำยาซักผ้า","น้ำยาปรับผ้านุ่ม","ไม้แขวนชุดชั้นใน",
"สเปรย์เช็ดกระจก","น้ำยาทำความสะอาด","ถุงมือยาง",
"ลูกกลิ้งเก็บฝุ่น","ผ้าไมโครไฟเบอร์"
],

"ยาและฉุกเฉิน":[
"พาราเซตามอล","ยาแก้แพ้","ยาแก้ท้องเสีย","พลาสเตอร์ยา","เบตาดีน",
"กล่องยา","Power Bank","สายชาร์จสำรอง","แบตเตอรี่ไฟฉาย"
],

"อุปกรณ์ทั่วไป":[
"แฟ้มเอกสาร","กรรไกร","เทปใส","ปากกา","คัตเตอร์"
]

};

const appDiv = document.getElementById("app");

// ✅ UI + Sync
Object.keys(data).forEach(section => {

  const div = document.createElement("div");
  div.className = "section";

  const title = document.createElement("h3");
  title.textContent = section;
  div.appendChild(title);

  data[section].forEach(item => {

    const id = section + "_" + item;

    const row = document.createElement("div");
    row.className = "item";

    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";

    const label = document.createElement("span");
    label.textContent = item;

    const note = document.createElement("input");
    note.placeholder = "หมายเหตุ...";
    note.className = "note";

    // ✅ โหลดจาก Cloud (real-time)
    onSnapshot(doc(db, "checklist", id), (snap) => {
      if (snap.exists()) {
        checkbox.checked = snap.data().checked;
        note.value = snap.data().note || "";
      }
    });

    // ✅ บันทึก
    checkbox.onchange = () => {
      setDoc(doc(db, "checklist", id), {
        checked: checkbox.checked,
        note: note.value
      });
    };

    note.oninput = () => {
      setDoc(doc(db, "checklist", id), {
        checked: checkbox.checked,
        note: note.value
      });
    };

    row.appendChild(checkbox);
    row.appendChild(label);

    div.appendChild(row);
    div.appendChild(note);
  });

  appDiv.appendChild(div);
});

</script>

</body>
</html>
