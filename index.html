const appDiv = document.getElementById("app");

// ✅ สร้าง UI
Object.keys(data).forEach(section => {

  const sec = document.createElement("div");
  sec.className = "section";

  const title = document.createElement("h3");
  title.textContent = section;
  sec.appendChild(title);

  data[section].forEach(item => {
    const id = section + "_" + item;

    const row = document.createElement("div");
    row.className = "item";

    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";

    const note = document.createElement("input");
    note.placeholder = "หมายเหตุ";
    note.className = "note";

    // ✅ โหลดข้อมูลจาก Cloud
    db.collection("checklist").doc(id).onSnapshot(doc => {
      if (doc.exists) {
        checkbox.checked = doc.data().checked;
        note.value = doc.data().note || "";
      }
    });

    // ✅ บันทึก Cloud
    checkbox.onchange = () => {
      db.collection("checklist").doc(id).set({
        checked: checkbox.checked,
        note: note.value
      });
    };

    note.oninput = () => {
      db.collection("checklist").doc(id).set({
        checked: checkbox.checked,
        note: note.value
      });
    };

    row.appendChild(checkbox);
    row.appendChild(document.createTextNode(item));

    sec.appendChild(row);
    sec.appendChild(note);
  });

  appDiv.appendChild(sec);
});

</script>
